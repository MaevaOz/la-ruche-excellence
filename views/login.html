<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration | La Ruche Excellence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap');
        body { background-color: #0d1b2a; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Inter', sans-serif; color: #f4ecdf; margin: 0; }
        .login-wrapper { background: #ffffff; padding: 4rem; width: 100%; max-width: 480px; text-align: center; color: #0d1b2a; border-top: 6px solid #c5a880; box-shadow: 0 30px 60px rgba(0,0,0,0.4); }
        h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #0d1b2a; margin-bottom: 2.5rem; font-weight: 700; }
        .form-control { border-radius: 0; border: 1px solid #c5a880; padding: 1rem; background-color: #fdfdfd; font-family: 'Inter', sans-serif; }
        .form-control:focus { outline: none; box-shadow: none; border-color: #0d1b2a; }
        .btn-premium { background-color: #0d1b2a; color: #c5a880; width: 100%; padding: 1rem; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; border: 1px solid #0d1b2a; margin-top: 1.5rem; transition: all 0.3s ease; border-radius: 0; }
        .btn-premium:hover { background-color: #c5a880; color: #0d1b2a; border-color: #c5a880; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <h1>Administration</h1>
        <form method="POST" action="/login">
            <div class="text-start">
                <label class="form-label" style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.15em; font-weight: 700; color: #0d1b2a; margin-bottom: 0.5rem;">Clé d'accès sécurisée</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-premium">Accéder au tableau de bord</button>
        </form>
    </div>
</body>
</html>
