<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-content="meta.title"></title>
    <meta name="description" data-attr="content:meta.description">
    <link rel="stylesheet" href="/style.css">
    <script src="/app.js" defer></script>
</head>
<body>
    <nav class="navbar" id="navbar">
        <a href="/" class="nav-logo">
            <span data-content="nav.logo.text_principal" style="color: var(--bleu-abyssal)"></span><span data-content="nav.logo.sub"></span>
        </a>
        <div class="nav-links" data-list="nav.links" data-item="link">
            <template>
                <a class="nav-link" data-attr="href:link.url" data-content="link.label"></a>
            </template>
        </div>
        <a href="/contact" class="btn-audit" data-content="hero.ctas[0].label" data-attr="href:hero.ctas[0].url"></a>
    </nav>

    <main style="padding-top: 10rem;">
        <div class="section">
            <span style="text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.75rem; font-weight: 600; color: var(--vieil-or); margin-bottom: 3rem; display: block;">
                <a href="/products" style="color: inherit; text-decoration: none;">Nos Produits</a> > <span data-content="currentProduct.name"></span>
            </span>

            <div style="display: flex; gap: 4rem; align-items: flex-start; justify-content: space-between;">
                
                <div style="flex: 1; min-width: 0;">
                    <h1 data-content="currentProduct.name" style="font-size: clamp(2.5rem, 5vw, 4rem); margin-bottom: 2rem; color: var(--bleu-abyssal); font-family: 'Playfair Display', serif;"></h1>
                    <p data-content="currentProduct.desc" style="font-size: 1.25rem; margin-bottom: 4rem; opacity: 0.9; line-height: 1.8; color: var(--bleu-abyssal);"></p>

                    <div class="local-tabs-nav" style="margin-bottom: 2rem;">
                        <button class="local-tab-btn active" data-content="portfolio.tabs.details"></button>
                        <button class="local-tab-btn" data-content="portfolio.tabs.garanties"></button>
                        <button class="local-tab-btn" data-content="portfolio.tabs.documents"></button>
                    </div>
                    
                    <div class="tab-content" style="min-height: 200px; opacity: 0.8; line-height: 1.8;">
                        <p style="font-weight: 600; color: var(--bleu-abyssal);" data-content="portfolio.cima_disclaimer_html"></p>
                    </div>

                    <div class="tab-content" style="display:none; min-height: 200px; opacity: 0.8; line-height: 1.8;">
                        <ul data-list="currentProduct.garanties" data-item="gar" style="list-style: none; padding-left: 0;">
                            <template>
                                <li style="margin-bottom: 1rem; position: relative; padding-left: 1.5rem; color: var(--bleu-abyssal);">
                                    <span style="position: absolute; left: 0; color: var(--vieil-or); font-weight: bold;">+</span>
                                    <span data-content="gar"></span>
                                </li>
                            </template>
                        </ul>
                    </div>

                    <div class="tab-content" style="display:none; min-height: 200px; opacity: 0.8; line-height: 1.8;">
                        <ul data-list="currentProduct.documents" data-item="doc" style="list-style: none; padding-left: 0;">
                            <template>
                                <li style="margin-bottom: 1rem; position: relative; padding-left: 1.5rem; color: var(--bleu-abyssal);">
                                    <span style="position: absolute; left: 0; color: var(--vieil-or);">—</span>
                                    <span data-content="doc"></span>
                                    <span style="color: var(--vieil-or); float: right; font-size: 0.9rem; cursor: pointer;">Télécharger PDF</span>
                                </li>
                            </template>
                        </ul>
                    </div>
                        
                    <div style="margin-top: 4rem; padding: 2.5rem; background-color: var(--blanc-celeste); border: 1px solid rgba(197, 168, 128, 0.2); border-radius: 8px;">
                        <h4 style="font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--bleu-abyssal); margin-bottom: 1.5rem;" data-content="contact.reassurance_title"></h4>
                        <ul style="list-style: none; padding-left: 0;">
                            <li style="margin-bottom: 1rem; position: relative; padding-left: 1.5rem; color: var(--bleu-abyssal);">
                                <span style="position: absolute; left: 0; color: var(--vieil-or);">—</span>
                                <strong data-content="proof.cards[0].strong" style="color: var(--bleu-abyssal);"></strong> : <span data-content="proof.cards[0].p"></span>
                            </li>
                            <li style="margin-bottom: 1rem; position: relative; padding-left: 1.5rem; color: var(--bleu-abyssal);">
                                <span style="position: absolute; left: 0; color: var(--vieil-or);">—</span>
                                <strong data-content="proof.cards[1].strong" style="color: var(--bleu-abyssal);"></strong> : <span data-content="proof.cards[1].p"></span>
                            </li>
                            <li style="margin-bottom: 1rem; position: relative; padding-left: 1.5rem; color: var(--bleu-abyssal);">
                                <span style="position: absolute; left: 0; color: var(--vieil-or);">—</span>
                                <strong data-content="proof.cards[2].strong" style="color: var(--bleu-abyssal);"></strong> : <span data-content="proof.cards[2].p"></span>
                            </li>
                        </ul>
                    </div>
                </div>

                <aside class="conversion-block" style="width: 380px; position: sticky; top: 12rem; background: #FFFFFF; border: 1px solid rgba(11, 19, 43, 0.08); border-radius: 12px; padding: 2.5rem; box-shadow: 0 15px 35px rgba(11, 13, 43, 0.04); height: fit-content; box-sizing: border-box;">
                    <div class="badge" data-content="currentProduct.sector" style="display: inline-block; background: var(--blanc-celeste); color: var(--vieil-or); border: 1px solid rgba(197, 168, 128, 0.3); padding: 0.4rem 0.8rem; font-size: 0.75rem; text-transform: uppercase; font-weight: 600; letter-spacing: 0.05em; border-radius: 4px; margin-bottom: 1.5rem;"></div>
                    
                    <div style="margin-bottom: 2rem;">
                        <div style="font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--bleu-abyssal); font-weight: 700; line-height: 1;">
                            <span data-content="currentProduct.price"></span> <span style="font-size: 1.5rem; font-family: 'Inter', sans-serif; font-weight: 500;">FCFA</span>
                        </div>
                        <div data-content="portfolio.labels.price_note_html" style="font-size: 0.9rem; color: var(--bleu-abyssal); opacity: 0.6; margin-top: 0.3rem;"></div>
                    </div>

                    <div style="display: flex; flex-direction: column; gap: 0.8rem; margin-bottom: 2rem;">
                        <button id="open-subscription-modal" style="width: 100%; background: var(--bleu-abyssal); color: var(--blanc-celeste); border: none; padding: 1.1rem; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 1rem; border-radius: 6px; cursor: pointer; transition: opacity 0.2s; text-align: center;">
                            Souscrire maintenant
                        </button>
                        
                        
                    </div>

                    <div style="border-top: 1px solid rgba(11, 19, 43, 0.06); padding-top: 1.5rem; text-align: center;">
                        <h4 style="font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.9rem; color: var(--bleu-abyssal); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem;">Besoin d'aide ?</h4>
                        <div style="display: flex; flex-direction: column; gap: 0.6rem;">
                            <a href="tel:+24101761234" style="display: block; width: 100%; text-align: center; background: var(--blanc-celeste); color: var(--bleu-abyssal); padding: 0.85rem; border-radius: 6px; text-decoration: none; font-size: 0.9rem; font-weight: 500; box-sizing: border-box; transition: background 0.3s ease;">
    Appeler un conseiller
</a>
                            </a>
                            <a href="mailto:contact@larucheexcellence.ga" style="display: block; width: 100%; text-align: center; background: var(--blanc-celeste); color: var(--bleu-abyssal); padding: 0.85rem; border-radius: 6px; text-decoration: none; font-size: 0.9rem; font-weight: 500; box-sizing: border-box;">
                                Envoyer un email
                            </a>
                        </div>
                    </div>

                    <p style="font-size: 0.65rem; margin-top: 1.5rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; text-align: center; color: var(--bleu-abyssal);" data-content="hero.promise"></p>
                </aside>

            </div>
        </div>
    </main>

    <footer>
        <div class="footer-grid">
            <div>
                <div class="footer-logo">
                    <span data-content="nav.logo.text_principal"></span><span data-content="nav.logo.sub"></span>
                </div>
                <p class="footer-desc" data-content="footer.desc"></p>
            </div>
            <div class="footer-col">
                <h4 data-content="footer.titles.navigation"></h4>
                <ul data-list="nav.links" data-item="link">
                    <template>
                        <li><a data-attr="href:link.url" data-content="link.label"></a></li>
                    </template>
                </ul>
            </div>
            <div class="footer-col" style="min-width: 300px;">
                <h4 data-content="footer.titles.contact"></h4>
                <ul>
                    <li data-content="contact.blocs.email"></li>
                    <li data-content="contact.blocs.whatsapp"></li>
                    <li style="margin-top: 2rem;">
                         <a data-attr="href:contact.blocs.whatsapp_url" target="_blank" rel="noopener noreferrer" style="color: var(--vieil-or); text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.85rem; font-weight: 600; border-bottom: 1px solid var(--vieil-or); padding-bottom: 0.25rem;" data-content="footer.labels.emergency"></a>
                    </li>
                </ul>
                <h4 style="margin-top: 2rem; color: var(--vieil-or); font-size: 0.9rem; text-transform: uppercase;">Documents Légaux</h4>
                <ul>
                    <li><a href="/legal" style="opacity: 0.8; font-size: 0.9rem;">Mentions légales, RGPD & Cookies</a></li>
                </ul>
            </div>
        </div>
        <div class="footer-bottom">
            <div style="flex-grow: 1;">
                <span data-content="footer.bottom_left"></span>
                <span style="opacity: 0.5; margin: 0 0.5rem;">|</span>
                Site designé & structuré par <a href="https://maekiastudio.onrender.com" target="_blank" rel="noopener noreferrer" style="color: var(--vieil-or); font-weight: 600;">MaEkia Studio</a>
            </div>
            <div data-content="footer.bottom_right" style="text-align: right; max-width: 50%;"></div>
        </div>
    </footer>

    <div id="subscription-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 19, 43, 0.4); backdrop-filter: blur(4px); z-index: 9999; justify-content: center; align-items: center;">
        <div style="background: #FFFFFF; width: 100%; max-width: 600px; border-radius: 12px; box-shadow: 0 25px 50px rgba(11, 19, 43, 0.15); overflow: hidden; display: flex; flex-direction: column; max-height: 90vh; margin: 20px;">
            
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 2rem 2.5rem; border-bottom: 1px solid rgba(11, 19, 43, 0.06);">
                <h3 style="font-family: 'Playfair Display', serif; color: var(--bleu-abyssal); font-size: 1.75rem; margin: 0; font-weight: 700;">Demande de souscription</h3>
                <button id="close-subscription-modal" style="background: transparent; border: none; font-size: 1.75rem; color: var(--bleu-abyssal); opacity: 0.5; cursor: pointer; padding: 0.2rem 0.5rem;">&times;</button>
            </div>

            <form action="/api/subscribe" method="POST" style="padding: 2.5rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1.25rem; font-family: 'Inter', sans-serif; box-sizing: border-box;">
                
                <div style="display: flex; gap: 1.5rem;">
                    <div style="flex: 1;">
                        <label style="display: block; font-size: 0.85rem; font-weight: 600; color: var(--bleu-abyssal); margin-bottom: 0.5rem;">Prénom *</label>
                        <input type="text" name="firstname" required style="width: 100%; padding: 0.8rem 1rem; border: 1px solid rgba(11, 19, 43, 0.12); border-radius: 6px; font-size: 0.95rem; color: var(--bleu-abyssal); box-sizing: border-box; font-family: inherit;">
                    </div>
                    <div style="flex: 1;">
                        <label style="display: block; font-size: 0.85rem; font-weight: 600; color: var(--bleu-abyssal); margin-bottom: 0.5rem;">Nom *</label>
                        <input type="text" name="lastname" required style="width: 100%; padding: 0.8rem 1rem; border: 1px solid rgba(11, 19, 43, 0.12); border-radius: 6px; font-size: 0.95rem; color: var(--bleu-abyssal); box-sizing: border-box; font-family: inherit;">
                    </div>
                </div>

                <div>
                    <label style="display: block; font-size: 0.85rem; font-weight: 600; color: var(--bleu-abyssal); margin-bottom: 0.5rem;">Email *</label>
                    <input type="email" name="email" required style="width: 100%; padding: 0.8rem 1rem; border: 1px solid rgba(11, 19, 43, 0.12); border-radius: 6px; font-size: 0.95rem; color: var(--bleu-abyssal); box-sizing: border-box; font-family: inherit;">
                </div>

                <div>
                    <label style="display: block; font-size: 0.85rem; font-weight: 600; color: var(--bleu-abyssal); margin-bottom: 0.5rem;">Téléphone *</label>
                    <input type="tel" name="phone" required placeholder="+241" style="width: 100%; padding: 0.8rem 1rem; border: 1px solid rgba(11, 19, 43, 0.12); border-radius: 6px; font-size: 0.95rem; color: var(--bleu-abyssal); box-sizing: border-box; font-family: inherit;">
                </div>

                <div style="display: flex; gap: 1.5rem;">
                    <div style="flex: 1;">
                        <label style="display: block; font-size: 0.85rem; font-weight: 600; color: var(--bleu-abyssal); margin-bottom: 0.5rem;">Type de véhicule</label>
                        <select name="vehicle_type" style="width: 100%; padding: 0.8rem 1rem; border: 1px solid rgba(11, 19, 43, 0.12); border-radius: 6px; font-size: 0.95rem; color: var(--bleu-abyssal); background: #FFF; box-sizing: border-box; font-family: inherit;">
                            <option value="">Sélectionner</option>
                            <option value="citadine">Citadine / Berline</option>
                            <option value="suv">SUV / 4x4</option>
                            <option value="utilitaire">Utilitaire / Commercial</option>
                        </select>
                    </div>
                    <div style="flex: 1;">
                        <label style="display: block; font-size: 0.85rem; font-weight: 600; color: var(--bleu-abyssal); margin-bottom: 0.5rem;">Année</label>
                        <input type="number" name="vehicle_year" placeholder="Ex: 2025" style="width: 100%; padding: 0.8rem 1rem; border: 1px solid rgba(11, 19, 43, 0.12); border-radius: 6px; font-size: 0.95rem; color: var(--bleu-abyssal); box-sizing: border-box; font-family: inherit;">
                    </div>
                </div>

                <div>
                    <label style="display: block; font-size: 0.85rem; font-weight: 600; color: var(--bleu-abyssal); margin-bottom: 0.5rem;">Usage principal</label>
                    <select name="vehicle_usage" style="width: 100%; padding: 0.8rem 1rem; border: 1px solid rgba(11, 19, 43, 0.12); border-radius: 6px; font-size: 0.95rem; color: var(--bleu-abyssal); background: #FFF; box-sizing: border-box; font-family: inherit;">
                        <option value="">Sélectionner</option>
                        <option value="prive">Privé / Trajet travail</option>
                        <option value="professionnel">Professionnel / Commercial</option>
                        <option value="transport">Transport de personnes ou marchandises</option>
                    </select>
                </div>

                <div>
                    <label style="display: block; font-size: 0.85rem; font-weight: 600; color: var(--bleu-abyssal); margin-bottom: 0.5rem;">Message (optionnel)</label>
                    <textarea name="message" rows="3" placeholder="Informations complémentaires..." style="width: 100%; padding: 0.8rem 1rem; border: 1px solid rgba(11, 19, 43, 0.12); border-radius: 6px; font-size: 0.95rem; color: var(--bleu-abyssal); resize: none; box-sizing: border-box; font-family: inherit;"></textarea>
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1rem; border-top: 1px solid rgba(11, 19, 43, 0.06); padding-top: 1.5rem;">
                    <button type="button" id="cancel-subscription" style="background: transparent; color: var(--bleu-abyssal); border: 1px solid rgba(11, 19, 43, 0.2); padding: 0.8rem 2rem; font-size: 0.95rem; font-weight: 500; border-radius: 6px; cursor: pointer; font-family: inherit;">
                        Annuler
                    </button>
                    <button type="submit" style="background: var(--bleu-abyssal); color: var(--blanc-celeste); border: none; padding: 0.8rem 2.5rem; font-size: 0.95rem; font-weight: 600; border-radius: 6px; cursor: pointer; font-family: inherit;">
                        Envoyer la demande
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
