<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-content="meta.title"></title>
    <!-- Balises OpenGraph de Production (Lues instantanément par WhatsApp, LinkedIn, etc.) -->
    <meta property="og:locale" content="fr_FR">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="La Ruche Excellence">
    <meta property="og:title" content="La Ruche Excellence — Solutions d'Assurance au Gabon">
    <meta property="og:description" content="Solutions d'assurance premium pour particuliers et professionnels. Plus de 25 ans d'expertise et de courtage au Gabon.">
    <meta property="og:url" content="https://larucheexcellence.alwaysdata.net/">
    <meta property="og:image" content="https://larucheexcellence.alwaysdata.net/og-image.JPG">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:type" content="image/jpeg">

    <meta name="description" data-attr="content:meta.description">
    <link rel="stylesheet" href="/style.css?v=3.0">
    <script src="/app.js" defer></script>
</head>
<body>
    <nav class="navbar" id="navbar">
        <a href="/" class="nav-logo">
            <span data-content="nav.logo.text_principal" style="color: var(--bleu-abyssal)"></span><span data-content="nav.logo.sub"></span>
        </a>

        <input type="checkbox" id="burger-toggle" class="burger-checkbox">
        <label for="burger-toggle" class="burger-label">
            <span></span>
            <span></span>
            <span></span>
        </label>

        <div class="nav-links" data-list="nav.links" data-item="link">
            <template>
                <a class="nav-link" data-attr="href:link.url" data-content="link.label"></a>
            </template>
        </div>
        <a href="/contact" class="btn-audit" data-content="hero.ctas[0].label" data-attr="href:hero.ctas[0].url"></a>
    </nav>

    <main style="padding-top: 10rem;">
        <section class="section">
            <div style="max-width: 1000px; margin: 0 auto; text-align: center; margin-bottom: 6rem;">
                <span class="hero-eyebrow" data-content="about.eyebrow"></span>
                <h1 data-content="about.title_html" style="font-size: clamp(3rem, 5vw, 4.5rem); margin-bottom: 2rem;"></h1>
                <p data-content="about.paragraphs[0]" style="font-size: 1.25rem; opacity: 0.85; line-height: 1.8; margin-bottom: 1.5rem;"></p>
                <p data-content="about.paragraphs[1]" style="font-size: 1.25rem; opacity: 0.85; line-height: 1.8;"></p>
            </div>
            
            <div class="grid" data-list="about.values" data-item="val">
                <template>
                    <div class="card" style="padding: 3rem;">
                        <h3 data-content="val.strong" style="font-size: 1.75rem; margin-bottom: 1rem;"></h3>
                        <p data-content="val.span"></p>
                    </div>
                </template>
            </div>
            
            <div style="display: flex; justify-content: center; gap: 4rem; margin-top: 6rem; flex-wrap: wrap;">
                <div style="text-align: center; max-width: 750px; margin: 0 auto;">
                     <h2 style="font-size: 3rem; margin-bottom: 0.5rem; color: var(--bleu-abyssal);" data-content="about.badge.strong"></h2>
                     <p style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--vieil-or); opacity: 1; font-weight: 600; margin-bottom: 1.5rem;" data-content="about.badge.span"></p>
                     <p style="font-size: 1.25rem; opacity: 0.85; line-height: 1.8; color: var(--bleu-abyssal); font-family: 'Inter', sans-serif;" data-content="about.badge.sub"></p>
                </div>
            </div>
        </section>

        <section class="section section-alt">
            <div class="section-header">
                <span class="section-eyebrow" data-content="process.eyebrow"></span>
                <h2 class="section-title" data-content="process.title_html"></h2>
                <p data-content="process.sub" style="max-width: 600px; margin: 0 auto; font-size: 1.1rem; opacity: 0.8;"></p>
            </div>

            <div class="grid" data-list="process.steps" data-item="step">
                <template>
                    <div class="card" style="position: relative; padding: 4rem 3rem 3rem;">
                        <div style="position: absolute; top: -1.5rem; left: 3rem; background-color: var(--vieil-or); color: var(--bleu-abyssal); font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; padding: 0.5rem 1.5rem; box-shadow: 0 10px 20px -5px var(--or-rgba);" data-content="step.num"></div>
                        <h3 data-content="step.title"></h3>
                        <p data-content="step.desc"></p>
                        <span style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.15em; font-weight: 700; color: var(--vieil-or);;" data-content="step.tag"></span>
                    </div>
                </template>
            </div>
            
            <div style="margin-top: 6rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem;">
                <div style="background-color: var(--ecru); padding: 3rem; border: 1px solid var(--or-rgba);">
                    <h4 style="font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--bleu-abyssal); margin-bottom: 1.5rem;" data-content="process.visual_cards.manage"></h4>
                    <p style="opacity: 0.8; font-size: 1rem; line-height: 1.8;" data-content="process.visual_cards.need"></p>
                </div>
                
                <div style="background-color: var(--bleu-abyssal); color: var(--ecru); padding: 3rem; display: flex; flex-direction: column; justify-content: center; text-align: center; border-bottom: 4px solid var(--vieil-or);">
                    <span style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.15em; font-weight: 700; color: var(--vieil-or); margin-bottom: 1.5rem;" data-content="process.visual_cards.delays_tag"></span>
                    <div style="font-family: 'Playfair Display', serif; font-size: 2.25rem; line-height: 1.3;" data-content="process.visual_cards.delays_html"></div>
                </div>

                <div style="background-color: var(--ecru); padding: 3rem; border: 1px solid var(--or-rgba);">
                    <h4 style="font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--bleu-abyssal); margin-bottom: 1.5rem;" data-content="process.visual_cards.payment_title"></h4>
                    <p style="opacity: 0.8; font-size: 1rem; line-height: 1.8;" data-content="process.visual_cards.payment_desc"></p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-grid">
            <div>
                <div class="footer-logo">
                    <span data-content="nav.logo.text_principal"></span><span data-content="nav.logo.sub"></span>
                </div>
                <p class="footer-desc" data-content="footer.desc"></p>
            </div>
            <div class="footer-col">
                <h4 data-content="footer.titles.navigation"></h4>
                <ul data-list="nav.links" data-item="link">
                    <template>
                        <li><a data-attr="href:link.url" data-content="link.label"></a></li>
                    </template>
                </ul>
            </div>
            <div class="footer-col" style="min-width: 300px;">
                <h4 data-content="footer.titles.contact"></h4>
                <ul>
                    <li data-content="contact.blocs.email"></li>
                    <li data-content="contact.blocs.whatsapp"></li>
                </ul>
                <h4 style="margin-top: 2rem; color: var(--vieil-or); font-size: 0.9rem; text-transform: uppercase;">Documents Légaux</h4>
                <ul>
                    <li><a href="/legal" style="opacity: 0.8; font-size: 0.9rem;">Mentions légales, RGPD & Cookies</a></li>
                </ul>
            </div>
        </div>
        <div class="footer-bottom">
            <div style="flex-grow: 1;">
                <span data-content="footer.bottom_left"></span>
                <span style="opacity: 0.5; margin: 0 0.5rem;">|</span>
                Site designé & structuré par <a href="https://maekiastudio.onrender.com" target="_blank" rel="noopener noreferrer" style="color: var(--vieil-or); font-weight: 600;">MaEkia Studio</a>
            </div>
            <div data-content="footer.bottom_right" style="text-align: right; max-width: 50%;"></div>
        </div>
    </footer>
</body>
</html>
